name: Deploy page

on:
  push:
   branches: ['master']

jobs:
  build_master:
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@master
      with:
       node-version: 12
    - run: npm ci
    - run: git config --global user.email "wassimbenjdida@gmail.com"
    - run: git config --global user.name "wassimbj"
    - run: npm run deploy
